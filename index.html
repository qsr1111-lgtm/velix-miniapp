<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velix VPN</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      width: 90%;
      max-width: 420px;
      background: #111827;
      border-radius: 20px;
      padding: 24px;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      margin: 8px 0;
      color: #cbd5e1;
      line-height: 1.4;
    }
    .btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      background: #2563eb;
      color: white;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Velix VPN</h1>
    <p>Тестовый экран Mini App</p>
    <p>Пробный период: 48 часов</p>
    <p>Тарифы от 299 ₽</p>
    <button class="btn">Открыть доступ</button>
  </div>
</body>
</html>
