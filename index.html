<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velix</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
--bg:#030507;
--card:#0d1118;
--line:rgba(255,255,255,.08);
--text:#fff;
--muted:rgba(255,255,255,.6);
}

*{box-sizing:border-box}
body{
margin:0;
background:var(--bg);
color:#fff;
font-family:-apple-system,Arial;
}

.sky{
position:fixed;
inset:0;
background:
radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.15),transparent),
radial-gradient(1px 1px at 70% 60%,rgba(255,255,255,.1),transparent),
radial-gradient(1px 1px at 40% 80%,rgba(255,255,255,.12),transparent);
opacity:.25;
}

.app{padding:16px;max-width:420px;margin:auto;position:relative}

.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}

.profile{display:flex;gap:10px;align-items:center}

.avatar{
width:44px;height:44px;border-radius:14px;
background:#111;
border:1px solid var(--line);
overflow:hidden;
display:flex;align-items:center;justify-content:center;
}

.avatar img{width:100%;height:100%;object-fit:cover}

.title{font-size:18px;font-weight:700}
.username{font-size:13px;color:var(--muted)}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:20px;
padding:20px;
margin-bottom:16px;
}

.big{font-size:28px;font-weight:800}
.muted{color:var(--muted)}

.btn{
width:100%;
padding:14px;
border-radius:14px;
border:none;
margin-top:10px;
font-weight:700;
}

.primary{background:#fff;color:#000}
.secondary{background:#111;color:#fff;border:1px solid var(--line)}

.key{
background:#000;
padding:12px;
border-radius:10px;
margin-top:10px;
word-break:break-all;
font-size:13px;
}

.server{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

.status-online{color:#00ff9c}
.status-mid{color:#ffd000}

.nav{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:calc(100% - 20px);
max-width:400px;
display:flex;
justify-content:space-around;
background:#05070b;
border:1px solid var(--line);
border-radius:20px;
padding:10px;
}

.nav button{
background:none;border:none;color:#999;font-size:12px
}

.nav .active{color:#fff}

.toast{
position:fixed;
bottom:100px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:14px 18px;
border-radius:16px;
border:1px solid var(--line);
opacity:0;
transition:.2s;
}
</style>
</head>

<body>
<div class="sky"></div>

<div class="app">

<div class="top">
<div class="profile">
<div class="avatar" id="avatar"></div>
<div>
<div class="title">Личный кабинет</div>
<div class="username" id="username">Загрузка...</div>
</div>
</div>
</div>

<div class="card">
<div class="big" id="statusText">Нет подписки</div>
<div class="muted" id="timeText">Активируйте пробный доступ</div>

<button class="btn primary" onclick="activateTrial()">Активировать 48 часов</button>
<button class="btn secondary" onclick="copyKey()">Скопировать код</button>

<div class="key" id="keyBox" style="display:none"></div>
</div>

<div class="card">
<div class="big">Серверы</div>

<div class="server">
<span>🇳🇱 Нидерланды</span>
<span class="status-online">● Онлайн</span>
</div>

<div class="server">
<span>🇩🇪 Германия</span>
<span class="status-online">● Онлайн</span>
</div>

<div class="server">
<span>🇺🇸 США</span>
<span class="status-mid">● Нагрузка</span>
</div>

</div>

</div>

<div class="nav">
<button class="active">Главная</button>
<button>Подписка</button>
<button>Баланс</button>
<button>Реф</button>
<button>Поддержка</button>
</div>

<div id="toast" class="toast"></div>

<script>
let state = JSON.parse(localStorage.getItem('velix') || '{}');

function save(){
localStorage.setItem('velix',JSON.stringify(state));
}

function toast(t){
const el=document.getElementById('toast');
el.innerText=t;
el.style.opacity=1;
setTimeout(()=>el.style.opacity=0,2000);
}

function generate(){
return 'VLX-'+Math.random().toString(36).substring(2,10).toUpperCase();
}

function activateTrial(){
state.key=generate();
state.expire=Date.now()+48*3600000;
save();
render();
toast('Пробный доступ активирован');
}

function copyKey(){
if(!state.key){toast('Нет кода');return}
navigator.clipboard.writeText(state.key);
toast('Код скопирован');
}

function render(){
if(state.key){
document.getElementById('keyBox').style.display='block';
document.getElementById('keyBox').innerText=state.key;

let left=Math.floor((state.expire-Date.now())/3600000);
document.getElementById('statusText').innerText='Подписка активна';
document.getElementById('timeText').innerText='Осталось '+left+' часов';
}
}

function loadUser(){
const tg=window.Telegram.WebApp;

if(tg.initDataUnsafe?.user){
let u=tg.initDataUnsafe.user;

document.getElementById('username').innerText=u.first_name;

if(u.photo_url){
document.getElementById('avatar').innerHTML=
'<img src="'+u.photo_url+'">'
}
}
}

loadUser();
render();
</script>

</body>
</html>
