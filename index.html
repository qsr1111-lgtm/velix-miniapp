<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velix</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: #fff;
}

.container {
  padding: 20px;
}

.card {
  background: #111827;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

.title {
  font-size: 22px;
  margin-bottom: 10px;
}

.sub {
  color: #9ca3af;
  font-size: 14px;
}

.big {
  font-size: 32px;
  margin: 10px 0;
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  margin-top: 15px;
  font-size: 16px;
  background: #2563eb;
  color: white;
}

.key {
  background: #020617;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  font-size: 14px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="title">Velix VPN</div>
    <div class="sub">Ваш доступ</div>

    <div id="status">Нет активной подписки</div>

    <button class="btn" onclick="activateTrial()">Активировать 48 часов</button>
  </div>

  <div class="card" id="keyBlock" style="display:none;">
    <div class="title">Ваш VPN ключ</div>
    <div class="key" id="key"></div>
  </div>

</div>

<script>

function generateKey() {
  return 'VLX-' + Math.random().toString(36).substring(2, 12).toUpperCase();
}

function activateTrial() {
  const key = generateKey();

  localStorage.setItem('velix_key', key);
  localStorage.setItem('velix_active', '1');

  updateUI();
}

function updateUI() {
  const active = localStorage.getItem('velix_active');
  const key = localStorage.getItem('velix_key');

  if (active) {
    document.getElementById('status').innerText = 'Подписка активна (пробный период)';
    document.getElementById('keyBlock').style.display = 'block';
    document.getElementById('key').innerText = key;
  }
}

updateUI();

</script>

</body>
</html>
